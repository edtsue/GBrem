<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ab4ff"/>
      <stop offset="0.4" stop-color="#22d3ee"/>
      <stop offset="0.7" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="0.2" stop-color="#22d3ee"/>
      <stop offset="0.4" stop-color="#8b5cf6"/>
      <stop offset="0.6" stop-color="#ec4899"/>
      <stop offset="0.8" stop-color="#FBBC04"/>
      <stop offset="1" stop-color="#34A853"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0" stop-color="#15171f"/>
      <stop offset="1" stop-color="#08080c"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- brand -->
  <g transform="translate(64,70)">
    <circle cx="16" cy="10" r="16" fill="url(#rainbow)"/>
    <circle cx="16" cy="10" r="6.5" fill="#08080c"/>
    <text x="44" y="18" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="800" fill="#eef0f4">Googlebook × Rembrand</text>
  </g>

  <!-- title -->
  <text x="600" y="300" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="96" font-weight="700" letter-spacing="2">
    <tspan fill="#ffffff">AS SEEN </tspan><tspan fill="url(#iris)">IN SCENES.</tspan>
  </text>

  <!-- glowbar glow + bar -->
  <rect x="410" y="360" width="380" height="18" rx="9" fill="url(#rainbow)" filter="url(#blur)" opacity="0.7"/>
  <rect x="430" y="366" width="340" height="8" rx="4" fill="url(#rainbow)"/>

  <!-- subtitle -->
  <text x="600" y="452" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="27" font-weight="600" fill="#9aa0ac">AI-native product placement · Placed at the speed of thought</text>

  <!-- launch tag -->
  <text x="600" y="520" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="700" letter-spacing="3" fill="#c4b5fd">GOOGLE'S FIRST AI LAPTOP · LAUNCHING EARLY OCTOBER</text>
</svg>
